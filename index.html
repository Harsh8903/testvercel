<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dark/Light Mode Toggle</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      transition: background-color 0.3s, color 0.3s;
    }

    body {
      font-family: system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #ffffff;
      color: #1a1a1a;
    }

    body.dark {
      background-color: #1a1a2e;
      color: #eaeaea;
    }

    .card {
      text-align: center;
      padding: 2rem;
      border-radius: 12px;
      background: inherit;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    body.dark .card {
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }

    h1 {
      margin-bottom: 1.5rem;
      font-size: 1.8rem;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 60px;
      height: 30px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background-color: #ccc;
      border-radius: 30px;
      transition: 0.3s;
    }

    .slider::before {
      content: "";
      position: absolute;
      height: 22px;
      width: 22px;
      left: 4px;
      bottom: 4px;
      background-color: #fff;
      border-radius: 50%;
      transition: 0.3s;
    }

    input:checked + .slider {
      background-color: #6c63ff;
    }

    input:checked + .slider::before {
      transform: translateX(30px);
    }

    .label-text {
      margin-top: 1rem;
      font-size: 1.1rem;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Theme Toggle</h1>
    <label class="switch">
      <input type="checkbox" id="themeToggle" />
      <span class="slider"></span>
    </label>
    <p class="label-text" id="modeLabel">☀️ Light Mode</p>
  </div>

  <script>
    const toggle = document.getElementById("themeToggle");
    const label = document.getElementById("modeLabel");

    toggle.addEventListener("change", () => {
      document.body.classList.toggle("dark", toggle.checked);
      label.textContent = toggle.checked ? "🌙 Dark Mode" : "☀️ Light Mode";
    });
  </script>
</body>
</html>
